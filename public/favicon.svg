<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <rect width="256" height="256" rx="64" fill="url(#bg-gradient)"/>
  
  <!-- Subtle lighting glow inside -->
  <circle cx="128" cy="64" r="96" fill="white" fill-opacity="0.04" filter="blur(32px)"/>

  <!-- Mortgage cap shape matching the new BrandMark -->
  <g transform="translate(32, 32) scale(3)">
    <!-- Cap Diamond -->
    <path
      d="M32 14L50 23L32 32L14 23L32 14Z"
      stroke="url(#accent-gradient)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Cap base -->
    <path
      d="M20 26.5V38.5C20 44 25.4 48 32 48C38.6 48 44 44 44 38.5V26.5"
      stroke="url(#accent-gradient)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Tassel -->
    <path
      d="M45 24.5V34"
      stroke="#F8FAFC"
      stroke-width="3"
      stroke-linecap="round"
    />
    <circle cx="45" cy="36" r="2.5" fill="#F8FAFC" />
    <!-- Smart center node -->
    <circle cx="32" cy="23" r="3" fill="#F8FAFC" />
  </g>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Accent Gradient matching the main logo -->
    <linearGradient id="accent-gradient" x1="14" y1="14" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
</svg>
